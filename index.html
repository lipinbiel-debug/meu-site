<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Musical</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c5ce7">

<style>
:root{
    --cor1:#6c5ce7;
    --cor2:#4834d4;
    --texto:#ffffff;
    --card:rgba(0,0,0,0.4);
}

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(45deg,var(--cor1),var(--cor2));
    background-size:400% 400%;
    animation:fundo 12s infinite alternate;
    color:var(--texto);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes fundo{
    0%{background-position:left;}
    100%{background-position:right;}
}

.menu{
    position:absolute;
    top:20px;
    right:20px;
    font-size:26px;
    cursor:pointer;
}

.config{
    display:none;
    position:absolute;
    top:60px;
    right:20px;
    width:260px;
    background:var(--card);
    padding:15px;
    border-radius:15px;
    backdrop-filter:blur(10px);
}

.config input,
.config select{
    width:100%;
    margin-bottom:10px;
}

.player{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    width:320px;
    text-align:center;
    backdrop-filter:blur(15px);
}

img{
    width:150px;
    height:150px;
    border-radius:12px;
    object-fit:cover;
    margin-bottom:10px;
}

button{
    background:var(--cor1);
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

input[type="range"]{
    width:100%;
}

</style>
</head>
<body>

<div class="menu" onclick="toggleConfig()">☰</div>

<div class="config" id="config">
<h3>Configurações</h3>

<label>Cor do Site</label>
<input type="color" id="corPicker">

<label>Fonte</label>
<select id="fonteSelect">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Georgia">Georgia</option>
<option value="Courier New">Courier</option>
</select>

<label>Mostrar Capa</label>
<select id="mostrarCapa">
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>

<label>Escolher Sua Própria Capa</label>
<input type="file" accept="image/*" id="capaInput">

</div>

<div class="player">
<img id="capa" src="https://via.placeholder.com/150">

<input type="file" accept="audio/*" id="musicaInput">

<audio id="audio"></audio>

<input type="range" id="progresso" value="0">

<div>
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<script>

const audio = document.getElementById("audio");
const progresso = document.getElementById("progresso");
const capa = document.getElementById("capa");

function play(){ audio.play(); }
function pause(){ audio.pause(); }

document.getElementById("musicaInput").addEventListener("change", e=>{
    const file = e.target.files[0];
    if(file){
        audio.src = URL.createObjectURL(file);
        audio.play();
    }
});

audio.addEventListener("timeupdate", ()=>{
    progresso.value = (audio.currentTime / audio.duration) * 100;
});

progresso.addEventListener("input", ()=>{
    audio.currentTime = (progresso.value / 100) * audio.duration;
});

function toggleConfig(){
    const c = document.getElementById("config");
    c.style.display = c.style.display === "block" ? "none" : "block";
}

function escurecer(hex,percent){
    let num=parseInt(hex.slice(1),16),
    r=(num>>16)-percent,
    g=((num>>8)&0x00FF)-percent,
    b=(num&0x0000FF)-percent;
    r=r<0?0:r;
    g=g<0?0:g;
    b=b<0?0:b;
    return "#"+(b|(g<<8)|(r<<16)).toString(16).padStart(6,"0");
}

const corPicker = document.getElementById("corPicker");
corPicker.addEventListener("input",()=>{
    const cor = corPicker.value;
    document.documentElement.style.setProperty("--cor1",cor);
    document.documentElement.style.setProperty("--cor2",escurecer(cor,40));
    localStorage.setItem("cor",cor);
});

const fonteSelect = document.getElementById("fonteSelect");
fonteSelect.addEventListener("change",()=>{
    document.body.style.fontFamily = fonteSelect.value;
    localStorage.setItem("fonte",fonteSelect.value);
});

const mostrarCapa = document.getElementById("mostrarCapa");
mostrarCapa.addEventListener("change",()=>{
    capa.style.display = mostrarCapa.value==="sim"?"block":"none";
    localStorage.setItem("mostrarCapa",mostrarCapa.value);
});

document.getElementById("capaInput").addEventListener("change",e=>{
    const file = e.target.files[0];
    if(file){
        capa.src = URL.createObjectURL(file);
    }
});

window.onload = ()=>{
    if(localStorage.getItem("cor")){
        corPicker.value = localStorage.getItem("cor");
        corPicker.dispatchEvent(new Event("input"));
    }
    if(localStorage.getItem("fonte")){
        document.body.style.fontFamily = localStorage.getItem("fonte");
        fonteSelect.value = localStorage.getItem("fonte");
    }
    if(localStorage.getItem("mostrarCapa")){
        mostrarCapa.value = localStorage.getItem("mostrarCapa");
        mostrarCapa.dispatchEvent(new Event("change"));
    }
};

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
