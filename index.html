<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<style>
:root{
  --accent-color:#0071e3;
  --fixed-gray:#f2f2f2;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
  background:var(--fixed-gray);
  color:#111;
}

/* Tela de carregamento */
#loader{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#progress-bar{
  width:200px;
  height:6px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
}

#progress{
  height:100%;
  width:0%;
  background:var(--accent-color);
}

#percent{
  margin-top:10px;
  font-size:14px;
}

/* Player */
.player{
  text-align:center;
  padding:40px 20px;
}

.cover{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:20px;
  background:#ccc;
}

.controls{
  margin-top:20px;
}

button{
  background:var(--accent-color);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:20px;
  cursor:pointer;
  margin:5px;
}

input[type="range"]{
  width:200px;
}

.menu{
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
  font-size:24px;
}

/* Menu */
#menuPanel{
  position:fixed;
  top:0;
  left:-300px;
  width:280px;
  height:100%;
  background:white;
  box-shadow:2px 0 10px rgba(0,0,0,0.1);
  padding:20px;
  transition:0.3s;
  overflow:auto;
}

#menuPanel.open{
  left:0;
}

.tab{
  margin-top:20px;
}

.playlist-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
}

.playlist-cover{
  width:40px;
  height:40px;
  border-radius:8px;
  margin-right:10px;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h2>Music App</h2>
  <div id="progress-bar">
    <div id="progress"></div>
  </div>
  <div id="percent">0%</div>
</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div id="menuPanel">
  <h3>Configurações</h3>

  <div class="tab">
    <h4>Visual</h4>
    <input type="color" id="colorPicker">
  </div>

  <div class="tab">
    <h4>Playlist</h4>
    <div id="playlist-list"></div>
  </div>

  <div class="tab">
    <h4>Tutorial + Suporte</h4>
    <p>Para suporte envie email para:</p>
    <a href="mailto:lipinbiel@gmail.com">lipinbiel@gmail.com</a>
    <p>Use o menu para adicionar músicas e tocar normalmente.</p>
  </div>
</div>

<div class="player">
  <img id="cover" class="cover" src="">
  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="playPause()">Play/Pause</button><br>
    Volume<br>
    <input type="range" min="0" max="1" step="0.01" id="volume">
  </div>
</div>

<script>
// LOADER
let percent = 0;
let interval = setInterval(()=>{
  percent++;
  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("percent").innerText = percent + "%";
  if(percent >= 100){
    clearInterval(interval);
    document.getElementById("loader").style.display="none";
  }
},15);

// MENU
function toggleMenu(){
  document.getElementById("menuPanel").classList.toggle("open");
}

// PLAYER
const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const volume = document.getElementById("volume");

volume.addEventListener("input",()=>{
  audio.volume = volume.value;
});

function playPause(){
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

function tocarMusica(url,capa){
  audio.src = url;
  cover.src = capa;
  audio.play();
}

// COR GLOBAL
const colorPicker = document.getElementById("colorPicker");
colorPicker.addEventListener("input",(e)=>{
  document.documentElement.style.setProperty("--accent-color", e.target.value);
  localStorage.setItem("accentColor", e.target.value);
});

const savedColor = localStorage.getItem("accentColor");
if(savedColor){
  document.documentElement.style.setProperty("--accent-color", savedColor);
  colorPicker.value = savedColor;
}

/* =========================
   PLAYLIST SALVANDO NO CELULAR
   ========================= */

let playlist = JSON.parse(localStorage.getItem("playlist")) || [];

function salvarPlaylist(){
  localStorage.setItem("playlist", JSON.stringify(playlist));
}

function adicionarMusica(nome,url,capa){
  playlist.push({nome,url,capa});
  salvarPlaylist();
  renderizarPlaylist();
}

function removerMusica(index){
  playlist.splice(index,1);
  salvarPlaylist();
  renderizarPlaylist();
}

function renderizarPlaylist(){
  const lista = document.getElementById("playlist-list");
  lista.innerHTML="";

  playlist.forEach((musica,index)=>{
    const item = document.createElement("div");
    item.className="playlist-item";
    item.innerHTML=`
      <div style="display:flex;align-items:center;">
        <img src="${musica.capa}" class="playlist-cover">
        <span>${musica.nome}</span>
      </div>
      <button onclick="removerMusica(${index})">✕</button>
    `;
    item.onclick=()=>tocarMusica(musica.url,musica.capa);
    lista.appendChild(item);
  });
}

window.addEventListener("load", renderizarPlaylist);
</script>

</body>
</html>
