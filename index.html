<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Player</title>

<style>
:root{
  --cor-principal:#6c63ff;
  --cor-fundo:#111;
  --cor-texto:#ffffff;
  --fonte:'Arial';
}

body{
  margin:0;
  background:var(--cor-fundo);
  color:var(--cor-texto);
  font-family:var(--fonte);
  transition:0.4s;
}

/* LOADING */

#loader{
  position:fixed;
  width:100%;
  height:100vh;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#logoApp{
  width:150px;
  border-radius:20px;
  margin-bottom:20px;
}

.barra{
  width:250px;
  height:15px;
  background:#333;
  border-radius:20px;
  overflow:hidden;
}

.progresso{
  height:100%;
  width:0%;
  background:var(--cor-principal);
  transition:0.2s;
}

#porcentagem{
  margin-top:10px;
  font-weight:bold;
}

/* HEADER */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:var(--cor-principal);
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* CONTAINER */

.container{
  text-align:center;
  padding:20px;
}

img.capa{
  width:200px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  margin:20px 0;
}

input, select, button{
  margin:10px;
  padding:8px;
  border-radius:8px;
  border:none;
}

button{
  background:var(--cor-principal);
  color:white;
  cursor:pointer;
}

/* MENU LATERAL */

#menu{
  position:fixed;
  right:-350px;
  top:0;
  width:350px;
  height:100%;
  background:#222;
  padding:20px;
  transition:0.4s;
  overflow-y:auto;
}

#menu.ativo{
  right:0;
}

.abas button{
  width:100%;
  margin:5px 0;
}

.aba-conteudo{
  display:none;
}

.ativo-aba{
  display:block;
}

ul{
  list-style:none;
  padding:0;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loader">
  <img src="https://via.placeholder.com/150" id="logoApp">
  <div class="barra">
    <div class="progresso"></div>
  </div>
  <p id="porcentagem">0%</p>
</div>

<header>
<h2>🎵 Meu Player</h2>
<div class="menu-btn" onclick="abrirMenu()">☰</div>
</header>

<div class="container">

<input type="file" id="audioInput" accept="audio/*"><br>

<img src="https://via.placeholder.com/200" class="capa" id="capa">

<audio id="player" controls></audio><br>

<label>🔊 Volume</label>
<input type="range" min="0" max="1" step="0.01" id="volume">

</div>

<!-- MENU CONFIG -->
<div id="menu">

<h2>⚙ Configurações</h2>

<div class="abas">
<button onclick="trocarAba('visual')">🎨 Visual</button>
<button onclick="trocarAba('playlist')">🎵 Playlist</button>
<button onclick="trocarAba('tutorial')">📖 Tutorial + Suporte</button>
</div>

<!-- VISUAL -->
<div id="visual" class="aba-conteudo ativo-aba">

<h3>Cor Principal</h3>
<input type="color" id="corPicker">

<h3>Fonte</h3>
<select id="fonteSelect">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Courier New">Courier</option>
<option value="Georgia">Georgia</option>
</select>

<h3>Capa Personalizada</h3>
<input type="file" id="capaUpload" accept="image/*">

</div>

<!-- PLAYLIST -->
<div id="playlist" class="aba-conteudo">

<h3>Adicionar Música</h3>
<input type="text" id="nomeMusica" placeholder="Nome da música">
<input type="file" id="musicaPlaylist" accept="audio/*">
<button onclick="adicionarPlaylist()">Adicionar</button>

<h3>Suas Músicas</h3>
<ul id="listaPlaylist"></ul>

</div>

<!-- TUTORIAL -->
<div id="tutorial" class="aba-conteudo">

<h3>📖 Como usar</h3>
<p>
1️⃣ Escolha uma música.<br>
2️⃣ Ajuste o volume.<br>
3️⃣ Personalize no Visual.<br>
4️⃣ Crie sua playlist.<br>
</p>

<h3>📧 Suporte</h3>
<a href="mailto:lipinbiel@gmail.com">
<button>Entrar em Contato</button>
</a>

</div>

</div>

<script>

/* LOADING */
let progresso = 0;
const barra = document.querySelector(".progresso");
const porcentagem = document.getElementById("porcentagem");
const loader = document.getElementById("loader");

function carregar(){
  if(progresso < 100){
    progresso++;
    barra.style.width = progresso + "%";
    porcentagem.innerText = progresso + "%";
    setTimeout(carregar, 15);
  } else {
    loader.style.opacity="0";
    setTimeout(()=> loader.style.display="none",500);
  }
}
window.addEventListener("load", carregar);

/* PLAYER */
const player = document.getElementById("player");
const audioInput = document.getElementById("audioInput");
const volume = document.getElementById("volume");
const capa = document.getElementById("capa");
const corPicker = document.getElementById("corPicker");
const fonteSelect = document.getElementById("fonteSelect");
const capaUpload = document.getElementById("capaUpload");
const listaPlaylist = document.getElementById("listaPlaylist");

audioInput.addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    player.src = URL.createObjectURL(file);
    player.play();
  }
});

volume.addEventListener("input",()=>{
  player.volume = volume.value;
});

corPicker.addEventListener("input",()=>{
  document.documentElement.style.setProperty('--cor-principal', corPicker.value);
});

fonteSelect.addEventListener("change",()=>{
  document.documentElement.style.setProperty('--fonte', fonteSelect.value);
});

capaUpload.addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    capa.src = URL.createObjectURL(file);
  }
});

/* MENU */
function abrirMenu(){
  document.getElementById("menu").classList.toggle("ativo");
}

function trocarAba(nome){
  document.querySelectorAll(".aba-conteudo").forEach(a=>a.classList.remove("ativo-aba"));
  document.getElementById(nome).classList.add("ativo-aba");
}

/* PLAYLIST */
function adicionarPlaylist(){
  const nome = document.getElementById("nomeMusica").value;
  const file = document.getElementById("musicaPlaylist").files[0];

  if(nome && file){
    const src = URL.createObjectURL(file);
    const li = document.createElement("li");
    li.innerHTML = `
      ${nome}
      <button onclick="tocar('${src}')">▶</button>
    `;
    listaPlaylist.appendChild(li);
    localStorage.setItem("playlist", listaPlaylist.innerHTML);
  }
}

function tocar(src){
  player.src = src;
  player.play();
}

window.onload = function(){
  listaPlaylist.innerHTML = localStorage.getItem("playlist") || "";
};

</script>

</body>
</html>
