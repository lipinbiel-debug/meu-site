<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Player</title>

<style>
:root{
  --accent-color:#0071e3;
  --bg-color:#f2f2f5;
  --card-color:#ffffff;
  --text-color:#1d1d1f;
  --soft-gray:#e5e5ea;
}

/* LOADING SCREEN */
#loader{
  position:fixed;
  inset:0;
  background:var(--bg-color);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

#loadingBar{
  width:200px;
  height:6px;
  background:var(--soft-gray);
  border-radius:10px;
  margin-top:20px;
  overflow:hidden;
}

#loadingProgress{
  height:100%;
  width:0%;
  background:var(--accent-color);
  transition:width 0.3s;
}

/* BASE */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg-color);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:var(--text-color);
}

.player{
  background:var(--card-color);
  width:360px;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
  text-align:center;
  position:relative;
}

.cover{
  width:100%;
  height:230px;
  background:var(--soft-gray);
  border-radius:20px;
  margin-bottom:15px;
  background-size:cover;
  background-position:center;
}

button{
  background:var(--accent-color);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:14px;
  cursor:pointer;
}

input[type="range"]{
  width:100%;
  accent-color:var(--accent-color);
}

.menu-btn{
  position:absolute;
  top:15px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

.menu{
  position:fixed;
  right:-100%;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 20px rgba(0,0,0,0.1);
  padding:20px;
  transition:0.4s;
  overflow-y:auto;
}

.menu.active{ right:0; }

.tabs{
  display:flex;
  justify-content:space-around;
  margin-bottom:20px;
}

.tab-btn{
  padding:8px;
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.tab-btn.active{
  border-bottom:2px solid var(--accent-color);
}

.tab{ display:none; }
.tab.active{ display:block; }

.playlist-item{
  padding:8px;
  border-radius:10px;
  background:var(--soft-gray);
  margin-bottom:8px;
  cursor:pointer;
}

.playlist-item.active{
  background:var(--accent-color);
  color:white;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loader">
  <h2>Minimal Player</h2>
  <div id="loadingBar">
    <div id="loadingProgress"></div>
  </div>
  <p id="loadingText">0%</p>
</div>

<div class="player" style="display:none;" id="app">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="cover" id="cover"></div>
<h3 id="musicName">Nenhuma música</h3>

<audio id="audio"></audio>

<button onclick="playMusic()">Play</button>
<button onclick="pauseMusic()">Pause</button>

<br><br>

<input type="range" id="progress" value="0">

<br><br>
Volume
<input type="range" id="volume" min="0" max="1" step="0.01">

</div>

<!-- MENU -->
<div class="menu" id="menu">

<div class="tabs">
<div class="tab-btn active" onclick="openTab('visual',this)">Visual</div>
<div class="tab-btn" onclick="openTab('playlist',this)">Playlist</div>
<div class="tab-btn" onclick="openTab('support',this)">Tutorial</div>
</div>

<div class="tab active" id="visual">
<h3>Cor de Destaque</h3>
<input type="color" id="colorPicker">
<br><br>
<h3>Adicionar Capa</h3>
<input type="file" id="coverUpload" accept="image/*">
</div>

<div class="tab" id="playlist">
<input type="file" id="musicUpload" accept="audio/*">
<div id="playlistContainer"></div>
</div>

<div class="tab" id="support">
<p>1. Vá em Playlist e adicione músicas</p>
<p>2. Clique para tocar</p>
<p>3. Adicione capa em Visual</p>
<br>
<a href="mailto:lipinbiel@gmail.com">Suporte por Email</a>
</div>

</div>

<script>
/* LOADING REAL */
let load=0;
const loader=setInterval(()=>{
  load+=5;
  document.getElementById("loadingProgress").style.width=load+"%";
  document.getElementById("loadingText").innerText=load+"%";
  if(load>=100){
    clearInterval(loader);
    document.getElementById("loader").style.display="none";
    document.getElementById("app").style.display="block";
  }
},50);

/* PLAYER */
const audio=document.getElementById("audio");
const progress=document.getElementById("progress");
const volume=document.getElementById("volume");
const musicName=document.getElementById("musicName");
const playlistContainer=document.getElementById("playlistContainer");
const cover=document.getElementById("cover");

let playlist=[];
let currentIndex=-1;

/* PLAYLIST */
document.getElementById("musicUpload").addEventListener("change",function(){
  const file=this.files[0];
  const url=URL.createObjectURL(file);
  playlist.push({name:file.name,src:url});
  renderPlaylist();
});

function renderPlaylist(){
  playlistContainer.innerHTML="";
  playlist.forEach((song,index)=>{
    const div=document.createElement("div");
    div.className="playlist-item";
    div.innerText=song.name;
    div.onclick=()=>loadMusic(index);
    if(index===currentIndex) div.classList.add("active");
    playlistContainer.appendChild(div);
  });
}

function loadMusic(index){
  currentIndex=index;
  audio.src=playlist[index].src;
  musicName.innerText=playlist[index].name;
  renderPlaylist();
  audio.play();
}

function playMusic(){audio.play();}
function pauseMusic(){audio.pause();}

/* PROGRESS */
audio.addEventListener("timeupdate",()=>{
  progress.value=(audio.currentTime/audio.duration)*100||0;
});

progress.addEventListener("input",()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
});

/* VOLUME */
volume.addEventListener("input",()=>{
  audio.volume=volume.value;
});

/* CAPA */
document.getElementById("coverUpload").addEventListener("change",function(){
  const file=this.files[0];
  cover.style.backgroundImage=`url(${URL.createObjectURL(file)})`;
});

/* COR GLOBAL */
const colorPicker=document.getElementById("colorPicker");
colorPicker.addEventListener("input",()=>{
  document.documentElement.style.setProperty("--accent-color",colorPicker.value);
});

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

function openTab(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  el.classList.add("active");
}
</script>

</body>
</html>
