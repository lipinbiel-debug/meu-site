<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Personalizável</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(-45deg, #ff0000, #000000, #1a1a1a);
    background-size: 400% 400%;
    animation: fundoAnimado 8s ease infinite;
}

@keyframes fundoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.player {
    background: rgba(0,0,0,0.8);
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px black;
    width: 340px;
}

button {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    color: black;
}

button:hover {
    background: black;
    color: white;
}

input[type="range"] {
    width: 100%;
    margin: 10px 0;
}

table {
    margin-top: 15px;
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 8px;
    cursor: pointer;
    border: 1px solid white;
}
</style>
</head>

<body>

<div class="player">
    <h2>🎵 Player Custom</h2>

    <button onclick="tocar()">Tocar</button>
    <button onclick="pausar()">Pausar</button>

    <input type="range" id="progress" value="0" min="0" max="100">

    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">

    <audio id="audio">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <h3>Escolha a cor do fundo:</h3>

    <table>
        <tr>
            <td onclick="mudarCor('#ff0000')">Vermelho</td>
            <td onclick="mudarCor('#00ff00')">Verde</td>
        </tr>
        <tr>
            <td onclick="mudarCor('#0000ff')">Azul</td>
            <td onclick="mudarCor('#ff00ff')">Roxo</td>
        </tr>
    </table>

</div>

<script>
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");

function tocar() {
    audio.play();
}

function pausar() {
    audio.pause();
}

volume.addEventListener("input", () => {
    audio.volume = volume.value;
});

audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

function mudarCor(cor) {
    document.body.style.background = `linear-gradient(-45deg, ${cor}, #000000, #1a1a1a)`;
    document.body.style.backgroundSize = "400% 400%";
}
</script>

</body>
</html>
