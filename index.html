<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Musical</title>

<style>
:root{
    --cor-principal: #6c5ce7;
    --cor-secundaria: #4b3fbf;
    --cor-texto: #ffffff;
    --cor-card: rgba(0,0,0,0.4);
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg,var(--cor-principal),var(--cor-secundaria));
    background-size: 400% 400%;
    animation: fundoAnimado 10s infinite alternate;
    color: var(--cor-texto);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes fundoAnimado{
    0%{background-position: left;}
    100%{background-position: right;}
}

.player{
    background: var(--cor-card);
    padding:20px;
    border-radius:15px;
    text-align:center;
    width:320px;
    backdrop-filter: blur(10px);
}

img{
    width:150px;
    height:150px;
    border-radius:10px;
    object-fit:cover;
    margin-bottom:10px;
}

button{
    background: var(--cor-principal);
    border:none;
    color:var(--cor-texto);
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

input[type="range"]{
    width:100%;
}

.menu{
    position:absolute;
    top:20px;
    right:20px;
    font-size:25px;
    cursor:pointer;
}

.config{
    display:none;
    position:absolute;
    top:60px;
    right:20px;
    background:var(--cor-card);
    padding:15px;
    border-radius:10px;
    width:250px;
    backdrop-filter: blur(10px);
}

.config input, .config select{
    width:100%;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="menu" onclick="toggleConfig()">☰</div>

<div class="config" id="config">
    <h3>Configurações</h3>

    <label>Cor Principal:</label>
    <input type="color" onchange="mudarCor(this.value)">

    <label>Fonte:</label>
    <select onchange="mudarFonte(this.value)">
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="Courier New">Courier</option>
        <option value="Georgia">Georgia</option>
    </select>

    <label>Mostrar Capa Automática:</label>
    <select onchange="toggleCapa(this.value)">
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
    </select>

    <label>Usar Sua Própria Capa:</label>
    <input type="file" accept="image/*" onchange="capaPersonalizada(event)">
</div>

<div class="player">
    <img id="capa" src="https://via.placeholder.com/150">
    
    <input type="file" accept="audio/*" onchange="carregarMusica(event)">
    
    <audio id="audio"></audio>

    <input type="range" id="progresso" value="0">

    <div>
        <button onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
    </div>
</div>

<script>
const audio = document.getElementById("audio");
const progresso = document.getElementById("progresso");
const capa = document.getElementById("capa");

function carregarMusica(event){
    const file = event.target.files[0];
    if(file){
        audio.src = URL.createObjectURL(file);
        audio.play();
    }
}

function play(){
    audio.play();
}

function pause(){
    audio.pause();
}

audio.addEventListener("timeupdate",()=>{
    progresso.value = (audio.currentTime / audio.duration) * 100;
});

progresso.addEventListener("input",()=>{
    audio.currentTime = (progresso.value / 100) * audio.duration;
});

function toggleConfig(){
    const config = document.getElementById("config");
    config.style.display = config.style.display === "block" ? "none" : "block";
}

function mudarCor(cor){
    document.documentElement.style.setProperty('--cor-principal', cor);
    document.documentElement.style.setProperty('--cor-secundaria', escurecer(cor,30));
}

function escurecer(cor,percent){
    let num = parseInt(cor.slice(1),16),
    r = (num >> 16) - percent,
    g = ((num >> 8) & 0x00FF) - percent,
    b = (num & 0x0000FF) - percent;

    r = (r<0)?0:r;
    g = (g<0)?0:g;
    b = (b<0)?0:b;

    return "#" + (b | (g << 8) | (r << 16)).toString(16).padStart(6,"0");
}

function mudarFonte(fonte){
    document.body.style.fontFamily = fonte;
}

function toggleCapa(valor){
    capa.style.display = valor === "sim" ? "block" : "none";
}

function capaPersonalizada(event){
    const file = event.target.files[0];
    if(file){
        capa.src = URL.createObjectURL(file);
    }
}
</script>

</body>
</html>
